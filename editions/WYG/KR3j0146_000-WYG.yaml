body:
  text: 雪履齋筆記雜家類三雜說之屬提要臣等謹案雪履齋筆記一卷元郭翼撰翼字羲仲崑山人號東郭生因以東郭先生故事名其齋曰雪履嘗獻策張士誠不用歸耕婁上老得訓導官偃蹇而終范陽盧熊題其墓曰遷善先生又為撰墓志載翼卒于至正二十四年後人謂翼至洪武初嘗徵授學官者悞也是編乃江行舟中所紀隨手襍録漫無銓次然議論多有可采者如解商書兼弱攻昧二句取張九成説解論語犬馬有養句取何晏舊注説駁張九齡金鑑録之偽辨蔡氏三仁之論皆為有識其論謝師直語一條論詩一條亦有義理惟解論語怪力亂神一條為力不同科一條過信古注則未免好竒耳乾隆四十五年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:55058aa4b64f92b2243831422fc748b68fa00d096847cf90fe9529222c7fdcf2
